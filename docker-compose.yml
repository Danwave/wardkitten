# Entorno de desarrollo local: MongoDB (replica set para soportar transacciones y change streams)
# + mongo-express para inspección. No usar en producción.
services:
  mongo:
    image: mongo:7
    container_name: wardkitten-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - wardkitten-mongo-data:/data/db
    healthcheck:
      test: echo 'try{rs.status().ok}catch(e){rs.initiate({_id:"rs0",members:[{_id:0,host:"localhost:27017"}]}).ok}' | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: wardkitten-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://localhost:27017/?replicaSet=rs0"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  wardkitten-mongo-data:
