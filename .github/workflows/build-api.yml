name: Build

on:
  push:
    branches: [main, Release]
    paths:
      - 'src/Wardkitten.Api/**'
      - 'src/Wardkitten.Application/**'
      - 'src/Wardkitten.Infrastructure/**'
      - 'src/Wardkitten.Domain/**'
      - 'src/Wardkitten.Shared.Contracts/**'
      # La imagen de la API empaqueta el Blazor WASM, así que reconstruye también con cambios de web/UI.
      - 'src/Wardkitten.Web/**'
      - 'src/Wardkitten.Shared.UI/**'
      - '.github/workflows/build-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Wardkitten.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/nimitaco/wardkitten:${{ github.run_number }}
            ghcr.io/nimitaco/wardkitten:latest

      - name: Fijar imagen API en el manifiesto y desplegar (ArgoCD)
        run: |
          set -euo pipefail
          tag="${{ github.run_number }}"
          file="K8S/produccion/wardkitten.yaml"
          sed -i -E "s#^([[:space:]]*image: ghcr\.io/nimitaco/wardkitten:).*#\1${tag}#" "$file"
          if git diff --quiet -- "$file"; then
            echo "El manifiesto ya apunta a :${tag}; nada que commitear."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git commit -m "K8S deploy wardkitten:${tag} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
