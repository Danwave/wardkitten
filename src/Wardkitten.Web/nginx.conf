server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tipos correctos para los assets de Blazor WASM.
    types {
        application/wasm wasm;
        application/octet-stream dll;
    }

    # SPA fallback para el routing del lado cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_types text/css application/javascript application/wasm application/json image/svg+xml;
}
